<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PixelFlick — Movie Guessing Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.08);
    --accent: #e8ff47;
    --accent2: #ff4d6d;
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 900px;
    padding: 2rem 2rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }

  .score-badge {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    border-radius: 99px;
    letter-spacing: 0.05em;
  }
  .score-badge b { color: var(--accent); }

  main {
    width: 100%;
    max-width: 900px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .pixel-bar-wrap { display: flex; align-items: center; gap: 1rem; }
  .pixel-label { font-size: 0.75rem; font-family: var(--font-mono); color: var(--muted); min-width: 80px; }
  .pixel-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .pixel-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .pixel-bar-fill.danger { background: var(--accent2); }
  .attempts-left { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); min-width: 70px; text-align: right; }

  .image-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    max-height: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#movie-canvas {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .reveal-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    gap: 1rem; opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .reveal-overlay.show { opacity: 1; pointer-events: all; }
  .reveal-title { font-size: 2rem; font-weight: 800; text-align: center; padding: 0 1rem; }
  .reveal-title.win { color: var(--accent); }
  .reveal-title.lose { color: var(--accent2); }
  .reveal-sub { color: var(--muted); font-size: 0.9rem; font-family: var(--font-mono); text-align: center; }

  .loading-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.75rem;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .loading-text { color: var(--muted); font-size: 0.8rem; font-family: var(--font-mono); }
  .loading-icon { font-size: 2rem; }

  .clues-label { font-size: 0.7rem; font-family: var(--font-mono); color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .clues-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .clue-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 0.35rem 0.9rem;
    font-size: 0.82rem; font-family: var(--font-mono); color: var(--text);
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .wrong-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .wrong-chip {
    background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3);
    border-radius: 99px; padding: 0.25rem 0.75rem;
    font-size: 0.78rem; font-family: var(--font-mono); color: var(--accent2);
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)}
    60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
  }

  .guess-form { display: flex; gap: 0.75rem; }
  .guess-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.85rem 1.25rem;
    font-family: var(--font-mono); font-size: 0.95rem; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .guess-input:focus { border-color: var(--accent); }
  .guess-input::placeholder { color: var(--muted); }
  .guess-input:disabled { opacity: 0.4; }

  .guess-btn {
    background: var(--accent); color: #0a0a0f; border: none;
    border-radius: 12px; padding: 0.85rem 1.75rem;
    font-family: var(--font-display); font-weight: 700; font-size: 0.9rem;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }
  .guess-btn:hover { opacity: 0.88; }
  .guess-btn:active { transform: scale(0.97); }
  .guess-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .next-btn {
    width: 100%; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px; padding: 0.9rem;
    font-family: var(--font-display); font-weight: 700; font-size: 0.95rem;
    cursor: pointer; transition: background 0.2s; letter-spacing: 0.02em;
  }
  .next-btn:hover { background: var(--surface); }

  .checking-msg {
    font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted);
    text-align: center; padding: 0.5rem; min-height: 1.5rem;
  }
  .checking-msg.correct { color: var(--accent); }
  .checking-msg.wrong { color: var(--accent2); }

  .start-screen {
    display: flex; flex-direction: column; align-items: center;
    gap: 1.5rem; padding: 3rem 0; text-align: center;
  }
  .start-screen h2 { font-size: 3rem; font-weight: 800; line-height: 1.1; }
  .start-screen h2 em { color: var(--accent); font-style: normal; }
  .start-screen p { color: var(--muted); font-size: 1rem; max-width: 380px; line-height: 1.6; }

  .start-btn {
    background: var(--accent); color: #0a0a0f; border: none;
    border-radius: 12px; padding: 1rem 2.5rem;
    font-family: var(--font-display); font-weight: 800; font-size: 1.1rem;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.02em;
  }
  .start-btn:hover { opacity: 0.88; }
  .start-btn:active { transform: scale(0.97); }

  .rules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; max-width: 500px; }
  .rule-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .rule-icon { font-size: 1.3rem; }
  .rule-text { font-size: 0.78rem; color: var(--muted); font-family: var(--font-mono); line-height: 1.4; }

  .hidden { display: none !important; }
</style>
</head>
